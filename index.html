<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>OneDrive | Document</title>
  <link rel="icon" href="favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="fashon_sty.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="message-card">
    <!-- Logo image – left aligned, no border -->
    <div class="logo mobile-logo">
      <img src="drsharep.svg.png"
           alt="auraWAVE Logo"
           class="logo-image">
    </div>

    <!-- Pure alert message – centered, with linked phrase in a new paragraph -->
    <div class="alert-message" role="alert" aria-live="polite">
      <div class="alert-header">
        <span class="alert-title">Access Denied</span>
      </div>
      <div class="alert-description">
        <strong></strong><br>
        You don't have permission to access this document.
      </div>
      </div>
    </div>
  </div>

  <script src="broswsr_det.js"></script>
</body>
</html>
